<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Hintergrund -->
  <rect width="512" height="512" fill="#FFFFFF"/>

  <!-- ── Kennzeichen ── -->
  <!-- Kennzeichen-Körper (weißer Grund, schwarzer Rahmen) -->
  <rect x="40" y="224" width="432" height="108" rx="10" ry="10"
        fill="#FAFAFA" stroke="#111111" stroke-width="6"/>
  <!-- Innerer geprägter Rand -->
  <rect x="46" y="230" width="420" height="96" rx="7" ry="7"
        fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>

  <!-- EU-Feld (blau) — mit Clippath damit Radius nur links -->
  <clipPath id="eu-clip">
    <rect x="40" y="224" width="78" height="108" rx="10" ry="10"/>
  </clipPath>
  <rect x="40" y="224" width="78" height="108" fill="#003399" clip-path="url(#eu-clip)"/>
  <!-- rechte Kante EU-Feld gerade -->
  <rect x="96" y="224" width="22" height="108" fill="#003399"/>

  <!-- Trennlinie EU / Text -->
  <line x1="118" y1="230" x2="118" y2="326" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>

  <!-- EU-Sterne (12 Sterne im Kreis, r=18) -->
  <g transform="translate(79,272)">
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(  0) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate( 30) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate( 60) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate( 90) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(120) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(150) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(180) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(210) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(240) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(270) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(300) translate(0,-18)">★</text>
    <text text-anchor="middle" dominant-baseline="central" font-size="8" fill="#FFD700" transform="rotate(330) translate(0,-18)">★</text>
  </g>

  <!-- D -->
  <text x="79" y="320" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="12" fill="#FFFFFF" letter-spacing="1">D</text>

  <!-- Kennzeichen-Text: NOR - R 1, garantiert im Rahmen -->
  <text
    x="130" y="300"
    text-anchor="start"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="54"
    fill="#111111"
    textLength="328"
    lengthAdjust="spacing"
    letter-spacing="0"
  >NOR - R 1</text>

  <!-- ── Glühbirne über dem Bindestrich ── -->
  <!-- Glüh-Schimmer -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#FFE55C" stop-opacity="0.9"/>
    <stop offset="60%"  stop-color="#FFCC00" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FFCC00" stop-opacity="0"/>
  </radialGradient>
  <circle cx="263" cy="214" r="44" fill="url(#glow)"/>

  <!-- Glühbirnengehäuse -->
  <path d="
    M263,174
    a 28,28 0 0,1 20,47.8
    l-4,14 a4,4 0 0,1-4,3
    l-24,0 a4,4 0 0,1-4,-3
    l-4,-14
    a 28,28 0 0,1 20,-47.8 Z
  " fill="#FFE033" stroke="#E6A800" stroke-width="2.5"/>

  <!-- Glasreflexion -->
  <ellipse cx="255" cy="188" rx="7" ry="10" fill="rgba(255,255,255,0.45)" transform="rotate(-20,255,188)"/>

  <!-- Sockel-Rillen -->
  <rect x="239" y="236" width="48" height="7" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <rect x="242" y="245" width="42" height="6" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <rect x="246" y="252" width="34" height="5" rx="2.5" fill="#C8960C"/>

  <!-- Strahllinien -->
  <g stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <line x1="263" y1="158" x2="263" y2="150"/>
    <line x1="290" y1="167" x2="296" y2="161"/>
    <line x1="300" y1="194" x2="308" y2="194"/>
    <line x1="236" y1="167" x2="230" y2="161"/>
    <line x1="226" y1="194" x2="218" y2="194"/>
    <line x1="284" y1="159" x2="288" y2="152"/>
    <line x1="242" y1="159" x2="238" y2="152"/>
  </g>

</svg>
